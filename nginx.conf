# Nginx reverse-proxy config for the chat app.
# Place in /etc/nginx/sites-available/chat, then:
#   ln -s /etc/nginx/sites-available/chat /etc/nginx/sites-enabled/chat
#   nginx -t && systemctl reload nginx
#
# Replace "chat.example.com" with your actual domain.
# SSL is handled by Certbot/Let's Encrypt — run after enabling:
#   certbot --nginx -d chat.example.com

server {
    listen 80;
    server_name chat.example.com;

    # Redirect all HTTP to HTTPS (Certbot will add the certificate block below)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name chat.example.com;

    # --- TLS (filled in by Certbot) ---
    # ssl_certificate /etc/letsencrypt/live/chat.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/chat.example.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers ---
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # --- Proxy to Next.js ---
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Required for SSE (Server-Sent Events): disable buffering
        proxy_buffering off;
        proxy_cache off;

        # Keep SSE connections alive (default nginx timeout is 60s)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Upgrade headers (needed if you ever add WebSocket)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection '';  # empty string = keep-alive for SSE

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Static assets: long cache, no SSE buffering issues ---
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
